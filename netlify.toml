[build]
  base    = "client"
  command = "npm install && npm run build && cd ../netlify/functions && npm install"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "../netlify/functions"
  node_bundler = "esbuild"

# Route API calls to the leaderboard function, forwarding scenarioId as query param
[[redirects]]
  from   = "/api/leaderboard/:scenarioId"
  to     = "/.netlify/functions/leaderboard?scenarioId=:scenarioId"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
