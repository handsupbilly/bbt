[build]
  base    = "client"
  command = "npm install && npm run build && cd ../netlify/functions && npm install"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "../netlify/functions"
  node_bundler = "esbuild"

# Route API calls to the leaderboard function
# The function reads scenarioId from the path segment
[[redirects]]
  from   = "/api/leaderboard/*"
  to     = "/.netlify/functions/leaderboard/:splat"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
